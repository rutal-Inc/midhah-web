packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  "@firebase/util": true
  "@swc/core": true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
catalog:
  eslint: ^9.39.4
  eslint-config-next: 16.2.9
  next: 16.2.9
  react: 19.2.4
  react-dom: 19.2.4
  prettier: ^3.8.4
  prettier-plugin-tailwindcss: ^0.6.14
  prettier-plugin-organize-imports: ^4.3.0
  tailwindcss: ^4.1.13
  "@tailwindcss/postcss": ^4.1.13
  typescript: ^6.0.3
  "@types/node": ^20.19.43
  "@types/react": ^19.1.13
  "@types/react-dom": ^19.1.9
  axios: "^1.18.0"
  firebase: "^12.14.0"
  zustand: "^5.0.14"
  bootstrap-icons: "^1.13.1"
  lucide-react: "^1.21.0"
  react-hot-toast: "^2.6.0"
  "@radix-ui/react-dialog": "^1.1.17"
minimumReleaseAgeExclude:
  - postcss@8.5.10
  - brace-expansion@1.1.16 || 5.0.7
  - js-yaml@4.3.0
  - protobufjs@7.6.5
overrides:
  brace-expansion@<1.1.16: ^1.1.16
  brace-expansion@>=3.0.0 <5.0.7: ^5.0.7
  js-yaml@>=4.0.0 <4.3.0: ^4.3.0
  postcss@<8.5.10: ^8.5.10
  protobufjs@>=7.5.0 <=7.6.4: ^7.6.5
